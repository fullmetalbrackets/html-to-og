<!DOCTYPE html>
<html>
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible+Next:ital,wght@0,200..800;1,200..800&family=M+PLUS+Rounded+1c:wght@400;900&display=swap" rel="stylesheet">
    <meta charset="utf-8">

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: #111;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 40px 20px;
        gap: 16px;
        font-family: 'Atkinson Hyperlegible Next', system-ui, sans-serif;
      }
      .wrapper {
        width: 1200px;
        transform: scale(0.7);
        transform-origin: top center;
        margin-bottom: -189px;
      }
      .og-card {
        width: 1200px;
        height: 630px;
        background: rgb(32, 33, 36);
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 200px 60px;
      }
      .title {
        font-size: 88px;
        display: inline-flex;
        place-items: center;
        justify-content: center;
        font-family: 'M PLUS Rounded 1c', system-ui, sans-serif;
        font-weight: 900;
        color: rgb(90, 194, 175);
        line-height: 1.1;
        max-width: 1080px;
        letter-spacing: -1px;
      }
      .bottom {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }
      .description {
        font-size: 32px;
        font-style: italic;
        font-weight: 300;
        color: rgb(164, 174, 188);
        line-height: 1.3;
        max-width: 1080px;
        display: flex;
        place-items: center;
        justify-content: center;
      }
      img {
        width: 96px;
        height: 96px;
        margin-right: 10px;
      }
    </style>

  </head>
  <body>

    <div class="wrapper">
      <div class="og-card">
        <div class="title">
          <img src="icon.svg" alt="icon" width="96px" height="96px">Fullmetalbrackets
        </div>
        <div class="bottom">
          <div class="description">
            A blog about self-hosting, web development, Linux, and more.
          </div>
        </div>
      </div>
    </div>

  </body>
</html>
